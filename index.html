<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyron</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0d1117;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#161b22;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

button{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#3b82f6;
}
</style>

</head>

<body>

<div class="box">

<h1>🚀 Zyron</h1>

<p>Meu site foi publicado com sucesso!</p>

<button onclick="alert('Bem-vindo ao Zyron!')">
Entrar
</button>

</div>

</body>
</html>
