<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial;background:#0d1117;color:white}
button,input{padding:12px;border:0;border-radius:8px;font-size:15px}
button{background:#2563eb;color:white;cursor:pointer}
input{width:100%;margin:6px 0;background:#222;color:white}
#login{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2563eb,#6d28d9)}
.box{width:320px;background:#161b22;padding:28px;border-radius:16px;text-align:center}
.box button{width:100%;margin-top:8px}.sec{background:#374151}
#msg{min-height:20px}
#app{display:none}
.fade-out{animation:sairAnim .55s ease forwards}
.fade-in{animation:entrarAnim .55s ease}
.autor{text-align:center;color:#8fa3bf;margin:35px 0 10px;font-size:14px}
.autor strong{color:#60a5fa}
@keyframes sairAnim{
 from{opacity:1;transform:scale(1)}
 to{opacity:0;transform:scale(.96);filter:blur(5px)}
}
@keyframes entrarAnim{
 from{opacity:0;transform:translateY(15px)}
 to{opacity:1;transform:translateY(0)}
}
nav{padding:15px;background:#161b22;display:flex;gap:8px;flex-wrap:wrap}
main{padding:25px;max-width:1000px;margin:auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
.card{background:#1c2128;padding:20px;border-radius:12px;border:1px solid #30363d}
.card h3{color:#60a5fa}


.fx-layer{
 position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden;
 background:radial-gradient(circle at center,rgba(31,111,235,.12),transparent 45%);
}
.data-node{
 position:absolute;width:4px;height:4px;border-radius:50%;
 background:#9cf4ff;
 box-shadow:0 0 8px #38d9ff,0 0 18px #356df3;
 animation:dataFlow 1.15s cubic-bezier(.12,.7,.2,1) forwards;
}
.data-node::after{
 content:"";position:absolute;right:2px;top:1px;width:var(--trail);
 height:1px;transform-origin:right center;
 background:linear-gradient(90deg,transparent,rgba(56,217,255,.75));
 transform:rotate(var(--rot));
}
.hex{
 position:absolute;left:50%;top:50%;width:80px;height:80px;
 border:1px solid rgba(88,223,255,.7);
 transform:translate(-50%,-50%) rotate(45deg);
 box-shadow:0 0 18px rgba(53,109,243,.45),inset 0 0 18px rgba(56,217,255,.12);
 animation:hexPulse 1s ease-out forwards;
}
.hex.h2{width:150px;height:150px;animation-delay:.08s}
.hex.h3{width:240px;height:240px;animation-delay:.16s}
.grid-wave{
 position:absolute;inset:-30%;
 background-image:linear-gradient(rgba(56,217,255,.08) 1px,transparent 1px),
 linear-gradient(90deg,rgba(56,217,255,.08) 1px,transparent 1px);
 background-size:42px 42px;
 transform:perspective(500px) rotateX(62deg) scale(1.5);
 animation:gridWave 1.1s ease-out forwards;
}
.digital-ring{
 position:absolute;left:50%;top:50%;width:30px;height:30px;border-radius:50%;
 border:2px solid #58dfff;transform:translate(-50%,-50%);
 box-shadow:0 0 25px #356df3;
 animation:ringExpand 1s ease-out forwards;
}
@keyframes dataFlow{
 0%{opacity:0;transform:translate(0,0) scale(.3)}
 15%{opacity:1}
 75%{opacity:.9}
 100%{opacity:0;transform:translate(var(--x),var(--y)) scale(1.3)}
}
@keyframes hexPulse{
 0%{opacity:0;transform:translate(-50%,-50%) rotate(45deg) scale(.2)}
 35%{opacity:.9}
 100%{opacity:0;transform:translate(-50%,-50%) rotate(135deg) scale(2.8)}
}
@keyframes ringExpand{
 0%{opacity:1;transform:translate(-50%,-50%) scale(.2)}
 100%{opacity:0;transform:translate(-50%,-50%) scale(35)}
}
@keyframes gridWave{
 0%{opacity:0;transform:perspective(500px) rotateX(62deg) scale(.8) translateY(100px)}
 35%{opacity:1}
 100%{opacity:0;transform:perspective(500px) rotateX(62deg) scale(1.8) translateY(-100px)}
}
.tech-flash{animation:techFlash .7s ease}
@keyframes techFlash{
 0%{filter:brightness(1)}
 35%{filter:brightness(1.35) saturate(1.25)}
 100%{filter:brightness(1)}
}

@media(max-width:600px){nav button{flex:1 1 45%}}

#particleBg{
 position:fixed;
 inset:0;
 width:100%;
 height:100%;
 z-index:-1;
 pointer-events:none;
 opacity:.75;
}
body{position:relative;overflow-x:hidden}


/* Animações extras da tela de login */
#login::before,#login::after{
 content:"";
 position:absolute;
 width:320px;height:320px;
 border:1px solid rgba(88,223,255,.22);
 border-radius:50%;
 animation:loginOrbit 8s linear infinite;
 pointer-events:none;
}
#login::after{
 width:520px;height:520px;
 border-style:dashed;
 border-color:rgba(139,92,246,.18);
 animation-duration:14s;
 animation-direction:reverse;
}
.box{
 position:relative;
 z-index:2;
 animation:loginCard 1s cubic-bezier(.16,1,.3,1);
 overflow:hidden;
}
.box::before{
 content:"";
 position:absolute;
 top:-100%;left:-60%;
 width:45%;height:300%;
 transform:rotate(25deg);
 background:linear-gradient(90deg,transparent,rgba(88,223,255,.13),transparent);
 animation:loginShine 4.5s ease-in-out infinite;
 pointer-events:none;
}
.logo{
 animation:logoPulse 2.4s ease-in-out infinite;
 text-shadow:0 0 12px rgba(88,223,255,.35);
}
#login input{
 transition:transform .25s,box-shadow .25s,border-color .25s;
 border:1px solid transparent;
}
#login input:focus{
 transform:translateY(-2px);
 border-color:#58dfff;
 box-shadow:0 0 0 3px rgba(88,223,255,.12),0 0 20px rgba(53,109,243,.2);
 outline:none;
}
#login button{
 transition:transform .2s,filter .2s,box-shadow .2s;
}
#login button:hover{
 transform:translateY(-2px);
 filter:brightness(1.12);
 box-shadow:0 8px 24px rgba(53,109,243,.28);
}
@keyframes loginCard{
 from{opacity:0;transform:translateY(35px) scale(.94);filter:blur(8px)}
 to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}
@keyframes loginOrbit{
 from{transform:rotate(0deg) scale(1)}
 50%{transform:rotate(180deg) scale(1.08)}
 to{transform:rotate(360deg) scale(1)}
}
@keyframes loginShine{
 0%,55%{left:-70%}
 85%,100%{left:140%}
}
@keyframes logoPulse{
 0%,100%{filter:brightness(1);transform:scale(1)}
 50%{filter:brightness(1.3);transform:scale(1.025)}
}

<body>

<section id="login">
 <div class="box">
  <h1>⚡ Zyron</h1>
  <p>Entre ou crie sua conta</p>
  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">
  <button class="sec" onclick="criar()">Criar conta</button>
  <button onclick="entrar()">Entrar</button>
  <p id="msg"></p>
 </div>
</section>

<section id="app">
 <nav>
  <button onclick="pagina('dashboard')">🏠 Dashboard</button>
  <button onclick="pagina('projetos')">🚀 Projetos</button>
  <button onclick="pagina('ia')">🤖 IA</button>
  <button onclick="pagina('tecnologia')">💻 Tecnologia</button>
  <button onclick="pagina('novidades')">📰 Novidades</button>
  <button onclick="pagina('parcerias')">🤝 Parcerias</button>
  <button id="adminNav" class="admin-only" onclick="pagina('admin')">🛠️ Admin</button>
  <button onclick="sair()">🚪 Sair</button>
 </nav>
 <main>
  <h1 id="titulo"></h1>
  <div id="conteudo"></div>
  <div class="autor">⚡ Zyron — Feito por <strong>Pedro Dias</strong><br>💬 Discord: <strong>pedrin_rlk_49688</strong></div>
 </main>
</section>

<script>
const user=document.getElementById("user"),pass=document.getElementById("pass");
const msg=document.getElementById("msg"),login=document.getElementById("login");
const app=document.getElementById("app"),titulo=document.getElementById("titulo");
const conteudo=document.getElementById("conteudo");

function criar(){
 if(!user.value||!pass.value){msg.innerHTML="⚠️ Preencha tudo.";return}
 localStorage.setItem("usuario",user.value);
 localStorage.setItem("senha",pass.value);
 msg.innerHTML="✅ Conta criada! Agora clique em Entrar.";
 msg.style.color="#4ade80";

const bgCanvas=document.getElementById("particleBg");
const bgCtx=bgCanvas.getContext("2d");
let bgParticles=[];

function resizeBg(){
 bgCanvas.width=innerWidth*devicePixelRatio;
 bgCanvas.height=innerHeight*devicePixelRatio;
 bgCanvas.style.width=innerWidth+"px";
 bgCanvas.style.height=innerHeight+"px";
 bgCtx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);

 const count=Math.min(85,Math.max(35,Math.floor(innerWidth/18)));
 bgParticles=Array.from({length:count},()=>({
  x:Math.random()*innerWidth,
  y:Math.random()*innerHeight,
  vx:(Math.random()-.5)*.35,
  vy:(Math.random()-.5)*.35,
  r:Math.random()*1.8+.6
 }));
}

function animateBg(){
 bgCtx.clearRect(0,0,innerWidth,innerHeight);

 for(const p of bgParticles){
  p.x+=p.vx;
  p.y+=p.vy;

  if(p.x<0||p.x>innerWidth)p.vx*=-1;
  if(p.y<0||p.y>innerHeight)p.vy*=-1;

  bgCtx.beginPath();
  bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
  bgCtx.fillStyle="rgba(88,223,255,.75)";
  bgCtx.shadowBlur=10;
  bgCtx.shadowColor="rgba(53,109,243,.8)";
  bgCtx.fill();
 }

 bgCtx.shadowBlur=0;

 for(let i=0;i<bgParticles.length;i++){
  for(let j=i+1;j<bgParticles.length;j++){
   const a=bgParticles[i],b=bgParticles[j];
   const dx=a.x-b.x,dy=a.y-b.y;
   const d=Math.sqrt(dx*dx+dy*dy);

   if(d<125){
    bgCtx.beginPath();
    bgCtx.moveTo(a.x,a.y);
    bgCtx.lineTo(b.x,b.y);
    bgCtx.strokeStyle=`rgba(56,217,255,${(1-d/125)*.18})`;
    bgCtx.lineWidth=.7;
    bgCtx.stroke();
   }
  }
 }

 requestAnimationFrame(animateBg);
}

addEventListener("resize",resizeBg);
resizeBg();
animateBg();

  portfolio:"Crie um portfólio profissional para um desenvolvedor, com apresentação, habilidades, projetos e contato",
  loja:"Crie uma loja moderna com título, três produtos, preços e botões de comprar",
  empresa:"Crie um site profissional para uma empresa de tecnologia, com serviços, sobre e contato",
  landing:"Crie uma landing page tecnológica com título forte, descrição, benefícios e botão de começar"
 };
 const el=document.getElementById("projectPrompt");
 if(el)el.value=textos[tipo];
}

function montarHTMLProjeto(descricao){
 const d=descricao.toLowerCase();
 let titulo="Meu Projeto";
 let subtitulo="Uma página criada no Zyron Project Studio.";
 let conteudo="";

 if(d.includes("portfólio")||d.includes("portfolio")){
  titulo="Meu Portfólio";
  subtitulo="Desenvolvedor • Criador • Tecnologia";
  conteudo='<section><h2>Sobre mim</h2><p>Transformo ideias em experiências digitais.</p></section><section><h2>Habilidades</h2><div class="grid"><article>HTML</article><article>CSS</article><article>JavaScript</article></div></section><section><h2>Projetos</h2><p>Conheça meus trabalhos e experiências.</p></section>';
 }else if(d.includes("loja")||d.includes("produto")){
  titulo="Nova Store";
  subtitulo="Produtos escolhidos para você.";
  conteudo='<section class="grid"><article><h2>Produto One</h2><p>R$ 99,90</p><button>Comprar</button></article><article><h2>Produto Pro</h2><p>R$ 149,90</p><button>Comprar</button></article><article><h2>Produto Max</h2><p>R$ 199,90</p><button>Comprar</button></article></section>';
 }else if(d.includes("empresa")||d.includes("serviço")||d.includes("servico")){
  titulo="Nexa Tecnologia";
  subtitulo="Soluções digitais para ideias que querem crescer.";
  conteudo='<section><h2>Nossos serviços</h2><div class="grid"><article>Desenvolvimento Web</article><article>Automação</article><article>Consultoria</article></div></section><section><h2>Sobre</h2><p>Criamos tecnologia simples, moderna e eficiente.</p></section>';
 }else{
  const palavras=descricao.trim().split(/\s+/).slice(0,7).join(" ");
  titulo=palavras?palavras.charAt(0).toUpperCase()+palavras.slice(1):"Projeto Zyron";
  subtitulo="Criado a partir da sua ideia no Zyron.";
  conteudo='<section><h2>Bem-vindo</h2><p>'+escProjeto(descricao||"Este é o começo do seu novo projeto.")+'</p><button>Começar agora</button></section><section><h2>Destaques</h2><div class="grid"><article>Design moderno</article><article>Experiência rápida</article><article>Feito para evoluir</article></div></section>';
 }

 return `<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${escProjeto(titulo)}</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#08101f;color:#eef6ff}
header{padding:80px 20px;text-align:center;background:radial-gradient(circle at top,#244d8e,#10172b 60%)}
h1{font-size:clamp(38px,7vw,72px);margin:0}header p{color:#a9bdd7;font-size:20px}
main{max-width:1000px;margin:auto;padding:35px 20px}section{padding:25px;margin:18px 0;border:1px solid #294568;border-radius:18px;background:#111c30}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
article{padding:20px;border-radius:14px;background:#182945;border:1px solid #31527b}
button{padding:12px 20px;border:0;border-radius:10px;background:linear-gradient(90deg,#2563eb,#7c3aed);color:white;font-weight:bold;cursor:pointer}
footer{text-align:center;padding:30px;color:#7790ae}
</style>
</head>
<body>
<header><h1>${escProjeto(titulo)}</h1><p>${escProjeto(subtitulo)}</p></header>
<main>${conteudo}</main>
<footer>Criado com Zyron Project Studio</footer>
</body>
</html>`;
}

function gerarProjetoIA(){
 const prompt=document.getElementById("projectPrompt");
 const code=document.getElementById("projectCode");
 const status=document.getElementById("projectStatus");
 if(!prompt||!code)return;
 if(!prompt.value.trim()){status.textContent="⚠ Descreva o projeto primeiro.";return}
 status.textContent="✦ Zyron AI está criando a estrutura...";
 setTimeout(()=>{
  code.value=montarHTMLProjeto(prompt.value);
  atualizarPreview();
  status.textContent="✓ Projeto gerado. Você pode editar o código e ver a prévia.";
 },650);
}

function atualizarPreview(){
 const code=document.getElementById("projectCode");
 const frame=document.getElementById("projectFrame");
 if(code&&frame)frame.srcdoc=code.value;
}

function salvarProjeto(){
 const code=document.getElementById("projectCode");
 const prompt=document.getElementById("projectPrompt");
 const status=document.getElementById("projectStatus");
 if(!code||!code.value.trim()){if(status)status.textContent="⚠ Gere um projeto primeiro.";return}
 localStorage.setItem("zyronProjectCode",code.value);
 localStorage.setItem("zyronProjectPrompt",prompt?prompt.value:"");
 if(status)status.textContent="✓ Projeto salvo neste navegador.";
}

function carregarProjetoSalvo(){
 const code=document.getElementById("projectCode");
 const prompt=document.getElementById("projectPrompt");
 if(!code)return;
 const salvo=localStorage.getItem("zyronProjectCode");
 if(salvo){
  code.value=salvo;
  if(prompt)prompt.value=localStorage.getItem("zyronProjectPrompt")||"";
  atualizarPreview();
 }
}

function novoProjeto(){
 const code=document.getElementById("projectCode");
 const prompt=document.getElementById("projectPrompt");
 const frame=document.getElementById("projectFrame");
 const status=document.getElementById("projectStatus");
 if(code)code.value="";
 if(prompt)prompt.value="";
 if(frame)frame.srcdoc="";
 if(status)status.textContent="Novo projeto iniciado.";
}

function baixarProjeto(){
 const code=document.getElementById("projectCode");
 const status=document.getElementById("projectStatus");
 if(!code||!code.value.trim()){if(status)status.textContent="⚠ Gere um projeto primeiro.";return}
 const blob=new Blob([code.value],{type:"text/html;charset=utf-8"});
 const url=URL.createObjectURL(blob);
 const a=document.createElement("a");
 a.href=url;a.download="meu-projeto-zyron.html";a.click();
 setTimeout(()=>URL.revokeObjectURL(url),1000);
 if(status)status.textContent="✓ HTML preparado para download.";
}

</script>
