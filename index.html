<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LojaPro</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
<div class="logo">🛒 LojaPro</div>
<input id="busca" placeholder="Pesquisar produtos...">
<button>Login</button>
</header>

<section class="hero">
<h1>Bem-vindo à LojaPro</h1>
<p>Eletrônicos, games e muito mais.</p>
</section>

<h2>Destaques</h2>
<div class="grid" id="produtos"></div>

<div class="cart">
<h3>Carrinho</h3>
<ul id="carrinho"></ul>
<p>Total: R$ <span id="total">0.00</span></p>
<button onclick="copiarPix()">Copiar Chave PIX</button>
</div>

<script src="js/app.js"></script>
</body>
</html>
